<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="father">
            <header class="header">
                <img src="./images/header-banner.png" alt="a colorful vegetarian burger">
            </header>

            <main>
                
                <div class="payment-popup">
                    <h3>Enter card details</h3>
                    <form>
                        <label="name"></label>
                        <input type="text" id="name" name="name" placeholder="Enter your name">
                        <label="cardNumber"></label><br>
                        <input type="text" id="cardNumber" name="card" placeholder="Enter card number"><br>
                        <label="cvv"></label>
                        <input type="text" id="cvv" name="cvv" placeholder="Enter CVV"><br>
                    </form>
                    <p role="button" class="payBtn">Pay</p>
                </div>
        
                <div class="menu">
                    <!-- item 1 -->
                    <div class="menu-item">
                        <img src="./images/pizza-ico.png" class="menu-image">
                        <ul class="item-details">
                            <li class="foodName">Pizza</li>
                            <li class="ingredients">pepperoni, mushroom, mozzarella</li>
                            <li class="priceEl">$14</li>
                        </ul>
                        <p class="add-btn" role="button">+</p>
                    </div>

                    <!-- item 2 -->
                    <div class="menu-item">
                        <img src="./images/pizza-ico.png" class="menu-image">
                        <ul class="item-details">
                            <li class="foodName">Pizza</li>
                            <li class="ingredients">pepperoni, mushroom, mozzarella</li>
                            <li class="priceEl">$14</li>
                        </ul>
                        <p class="add-btn" role="button">+</p>
                    </div>

                    <!-- item 3 -->
                    <div class="menu-item">
                        <img src="./images/pizza-ico.png" class="menu-image">
                        <ul class="item-details">
                            <li class="foodName">Pizza</li>
                            <li class="ingredients">pepperoni, mushroom, mozzarella</li>
                            <li class="priceEl">$14</li>
                        </ul>
                        <p class="add-btn" role="button">+</p>
                    </div>
                </div>
            </main>

            <section>
                <div class="cart">
                    <h3>Your Order</h3>
                    <div class="cart-items">
                        <!-- item 1 -->
                        <p class="cart-item-name">Pizza</p>
                        <p class="remove-btn" role="button">remove</p>
                        <p class="cart-item-price">$14</p>
                    </div>
                    <div class="cart-items">
                            <!-- item 2 -->
                            <p class="cart-item-name">Pizza</p>
                            <p class="remove-btn" role="button">remove</p>
                            <p class="cart-item-price">$14</p>
                    </div>
                </div>
                <div class="price-total">
                    <p>Total price:</p>
                    <p class="totalNumber">$26</p>
                </div>
                <p class="purchaseBtn" role="button">Complete Order</p>
            </section>

                    <label="name" placeholder="Enter your name"></label>

                    <label="cardNumber" placeholder="Enter card number"></label><br>
                    <input type="text" id="cardNumber" name="card"><br>
        </div> -->

        <script src="index.js" type="module"></script>
    </body>
</html>
